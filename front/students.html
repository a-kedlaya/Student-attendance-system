<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>Student Management</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <nav class="topbar">
    <div class="brand">College Portal</div>
    <div class="navlinks">
      <a href="index.html">Dashboard</a>
      <a href="students.html">Students</a>
      <a href="attendance.html">Attendance</a>
      <span id="teacherName" style="margin-left: 20px; color: #ffd43b;"></span>
      <a href="#" onclick="logout(); return false;">Logout</a>
    </div>
  </nav>

  <main class="container">
    <h2>Student Management</h2>

    <div class="formcard">
      <h3>Add New Student</h3>
      <label>Name <input id="nameInput"></label>
      <label>Roll No <input id="rollInput"></label>
      <label>Branch
        <select id="branchAdd"></select>
      </label>
      <label>Year
        <select id="yearAdd">
          <option>1</option>
          <option>2</option>
          <option>3</option>
          <option>4</option>
        </select>
      </label>
      <button id="addBtn">Add Student</button>
    </div>

    <div class="card">
      <h3>Student List</h3>
      <label>Filter Branch
        <select id="branchFilter"></select>
      </label>
      <label>Filter Year
        <select id="yearFilter">
          <option value="">All</option>
          <option>1</option>
          <option>2</option>
          <option>3</option>
          <option>4</option>
        </select>
      </label>
      <button id="showBtn">Show</button>

      <table id="studentsTable" class="striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Roll</th>
            <th>Branch</th>
            <th>Year</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <script src="scripts/common.js"></script>
  <script src="scripts/students.js"></script>
</body>

</html>
